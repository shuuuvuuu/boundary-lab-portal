apiVersion: apps/v1
kind: Deployment
metadata:
  name: hubs-entry-sidecar
  namespace: hcce
  labels:
    app: hubs-entry-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hubs-entry-sidecar
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hubs-entry-sidecar
    spec:
      containers:
        - name: hubs-entry-sidecar
          image: ghcr.io/shuuuvuuu/boundary-lab-portal-hubs-entry-sidecar:latest
          imagePullPolicy: Always
          ports:
            - name: health
              containerPort: 8080
          envFrom:
            - secretRef:
                name: hubs-entry-sidecar-env
          resources:
            requests:
              cpu: "10m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: hubs-entry-sidecar
  namespace: hcce
  labels:
    app: hubs-entry-sidecar
spec:
  clusterIP: None
  selector:
    app: hubs-entry-sidecar
  ports:
    - name: health
      port: 8080
      targetPort: health
