# portal.boundarylabo.com を hcce の haproxy-ingress 経由で portal Service にルーティング。
# 既存 subdomain-tls ingress と同じパターン（annotation 方式の ingress class、TLS 終端）。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal-tls
  namespace: hcce
  annotations:
    kubernetes.io/ingress.class: haproxy
spec:
  tls:
    - hosts:
        - portal.boundarylabo.com
      secretName: cert-portal.boundarylabo.com
  rules:
    - host: portal.boundarylabo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal
                port:
                  number: 80
