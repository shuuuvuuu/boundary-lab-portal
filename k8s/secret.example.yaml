# ⚠️⚠️⚠️ このファイルには絶対に実値を書き込まないこと ⚠️⚠️⚠️
# リポジトリは public 前提。Supabase anon key は PUBLIC 値で OK だが
# DISCORD_WEBHOOK_URL / RETICULUM_DB_URL は漏れると即事故になるため
# 必ず kubectl create secret で直接投入するか SealedSecret 化する。
# 本ファイルは kustomization.yaml から **除外** されているが、
# うっかり resources に足すと stringData が公開されるので注意。
#
# このファイルはスキーマ確認用サンプル（値はプレースホルダのみ）。
#
# 作成コマンド例:
# kubectl create secret generic portal-env -n portal \
#   --from-literal=NEXT_PUBLIC_SUPABASE_URL='https://xxx.supabase.co' \
#   --from-literal=NEXT_PUBLIC_SUPABASE_ANON_KEY='eyJhbGciOi...' \
#   --from-literal=NEXT_PUBLIC_SITE_URL='https://portal.boundarylabo.com' \
#   --from-literal=DISCORD_WEBHOOK_URL='https://discord.com/api/webhooks/...' \
#   --from-literal=RETICULUM_DB_URL='postgres://portal_ro:xxx@reticulum-postgres.hcce.svc.cluster.local:5432/ret_production' \
#   --from-literal=TRUSTED_PROXY_HOPS='1'
apiVersion: v1
kind: Secret
metadata:
  name: portal-env
  namespace: portal
type: Opaque
stringData:
  NEXT_PUBLIC_SUPABASE_URL: "REPLACE_ME"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "REPLACE_ME"
  NEXT_PUBLIC_SITE_URL: "https://portal.boundarylabo.com"
  DISCORD_WEBHOOK_URL: "REPLACE_ME"
  RETICULUM_DB_URL: ""
  TRUSTED_PROXY_HOPS: "1"
