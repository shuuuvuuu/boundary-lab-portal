# ⚠️⚠️⚠️ このファイルには絶対に実値を書き込まないこと ⚠️⚠️⚠️
# リポジトリは public 前提。DISCORD_WEBHOOK_URL / RETICULUM_DB_URL は
# 漏れると即事故になるため、必ず kubectl create secret で直接投入する。
# kustomization.yaml の resources からは除外済。
#
# 作成コマンド例 (hcce namespace):
# kubectl create secret generic portal-env -n hcce \
#   --from-literal=NEXT_PUBLIC_SUPABASE_URL='https://xxx.supabase.co' \
#   --from-literal=NEXT_PUBLIC_SUPABASE_ANON_KEY='eyJhbGciOi...' \
#   --from-literal=NEXT_PUBLIC_SITE_URL='https://portal.boundarylabo.com' \
#   --from-literal=DISCORD_WEBHOOK_URL='https://discord.com/api/webhooks/...' \
#   --from-literal=RETICULUM_DB_URL='' \
#   --from-literal=TRUSTED_PROXY_HOPS='1' \
#   --from-literal=SUPABASE_SERVICE_ROLE_KEY='' \
#   --from-literal=TEST_PLAY_AUTO_LOGIN_EMAIL=''
# ※ TEST_PLAY_AUTO_LOGIN_EMAIL と SUPABASE_SERVICE_ROLE_KEY が両方セットされている
#    間は、未ログイン訪問者が全員そのアカウントで自動ログインする状態になる。
#    本番公開前に必ず空にすること。
# ※ 本番 namespace `hcce` では TEST_PLAY_AUTO_LOGIN_EMAIL を空文字で投入すること。
#    middleware と /auth/test-login の両方に NODE_ENV ガードを入れているが、
#    secret 側も空にして二重防御にする。
apiVersion: v1
kind: Secret
metadata:
  name: portal-env
  namespace: hcce
type: Opaque
stringData:
  NEXT_PUBLIC_SUPABASE_URL: "REPLACE_ME"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "REPLACE_ME"
  NEXT_PUBLIC_SITE_URL: "https://portal.boundarylabo.com"
  DISCORD_WEBHOOK_URL: "REPLACE_ME"
  RETICULUM_DB_URL: ""
  TRUSTED_PROXY_HOPS: "1"
  # テストプレイ用: 両方セットされている間は未ログイン訪問者を自動ログインさせる
  SUPABASE_SERVICE_ROLE_KEY: ""
  TEST_PLAY_AUTO_LOGIN_EMAIL: ""
