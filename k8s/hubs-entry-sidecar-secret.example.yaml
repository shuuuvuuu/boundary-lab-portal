# ⚠️⚠️⚠️ このファイルには絶対に実値を書き込まないこと ⚠️⚠️⚠️
# 本番 Secret は Git 管理せず、以下のように直接投入する。
#
# kubectl -n hcce create secret generic hubs-entry-sidecar-env \
#   --from-literal=RETICULUM_WS_URL='ws://reticulum.hcce.svc.cluster.local:4000/socket' \
#   --from-literal=RETICULUM_DB_URL='postgres://ro_user:pass@reticulum-db:5432/ret_production' \
#   --from-literal=RETICULUM_BOT_ACCESS_KEY='replace-me' \
#   --from-literal=SUPABASE_URL='https://xxx.supabase.co' \
#   --from-literal=SUPABASE_SERVICE_ROLE_KEY='eyJ...' \
#   --from-literal=DISCORD_ALERT_WEBHOOK_URL='https://discord.com/api/webhooks/...' \
#   --from-literal=SIDECAR_LOG_LEVEL='info' \
#   --from-literal=SIDECAR_RECONNECT_MAX_MS='60000'
apiVersion: v1
kind: Secret
metadata:
  name: hubs-entry-sidecar-env
  namespace: hcce
type: Opaque
stringData:
  RETICULUM_WS_URL: "ws://reticulum.hcce.svc.cluster.local:4000/socket"
  RETICULUM_DB_URL: "REPLACE_ME"
  RETICULUM_BOT_ACCESS_KEY: "REPLACE_ME"
  SUPABASE_URL: "https://your-project.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: "REPLACE_ME"
  DISCORD_ALERT_WEBHOOK_URL: "REPLACE_ME"
  SIDECAR_LOG_LEVEL: "info"
  SIDECAR_RECONNECT_MAX_MS: "60000"
  SIDECAR_HEALTH_PORT: "8080"
