# Build, Push & Deploy
#
# 2026-04-22: K8s クラスタ (boundarylabo-k8s) を削除し、Droplet (boundary-world-01)
# への docker compose 相乗り構成へ移行中。自動 push/deploy を一時停止し、
# workflow_dispatch のみで走るようにした。Droplet デプロイ自動化は Phase 2 以降で
# 再整備する予定 (現状は代表が手動で `docker compose up -d --build portal` を実行)。
#
# 旧 K8s deploy ジョブは残すと必ず fail するのでコメントアウトしてある。
# build/push ジョブだけ手動実行して GHCR に image を積めるようにしておく。

name: Build, Push & Deploy

on:
  workflow_dispatch:

jobs:
  portal:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=portal
          cache-to: type=gha,mode=max,scope=portal
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=https://ops.boundarylabo.com

  hubs-entry-sidecar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-hubs-entry-sidecar
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: services/hubs-entry-sidecar
          file: services/hubs-entry-sidecar/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sidecar
          cache-to: type=gha,mode=max,scope=sidecar

