name: Build, Push & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  portal:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=portal
          cache-to: type=gha,mode=max,scope=portal
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=https://portal.boundarylabo.com

  hubs-entry-sidecar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-hubs-entry-sidecar
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: services/hubs-entry-sidecar
          file: services/hubs-entry-sidecar/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sidecar
          cache-to: type=gha,mode=max,scope=sidecar

  deploy:
    needs: [portal, hubs-entry-sidecar]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save do-sgp1-boundarylabo-k8s --expiry-seconds 600

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Update portal image
        run: |
          kubectl -n hcce set image deployment/portal \
            portal=ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.short }}

      - name: Update hubs-entry-sidecar image
        run: |
          kubectl -n hcce set image deployment/hubs-entry-sidecar \
            hubs-entry-sidecar=ghcr.io/${{ github.repository }}-hubs-entry-sidecar:${{ steps.sha.outputs.short }}

      - name: Wait for portal rollout
        run: kubectl -n hcce rollout status deployment/portal --timeout=5m

      - name: Wait for sidecar rollout
        run: kubectl -n hcce rollout status deployment/hubs-entry-sidecar --timeout=5m

      - name: Summary
        run: |
          echo "## Deployed ${{ steps.sha.outputs.short }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- portal: \`ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.short }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- sidecar: \`ghcr.io/${{ github.repository }}-hubs-entry-sidecar:${{ steps.sha.outputs.short }}\`" >> "$GITHUB_STEP_SUMMARY"
